repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: validate-blogs
        name: Validate blog HTML structure (init-analytics + JSON-LD + tag-balans)
        entry: ./scripts/validate-blogs.sh
        language: script
        files: ^blog/.*\.html$
        pass_filenames: false

      - id: validate-docs
        name: Validate cross-doc invariants (sessie-counter, datums, PRD-version, monetization-stack)
        entry: ./scripts/validate-docs.sh
        language: script
        files: ^(\.claude/CLAUDE\.md|PLANNING\.md|TASKS\.md)$
        pass_filenames: false
